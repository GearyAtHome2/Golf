name: Build Game for Windows and Mac

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build and Package
        # This triggers your :desktop:jpackage task we just fixed
        run: ./gradlew packageGame

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: GolfGame2026-${{ runner.os }}
          # UPDATED PATH: This grabs the folder containing the .exe / .app and the runtime
          path: desktop/build/distribution/