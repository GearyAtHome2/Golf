name: Build Game for Windows and Mac

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        # Use shell: bash so this works consistently across runners if needed,
        # though only strictly required for Unix-based systems.
        run: chmod +x gradlew
        if: runner.os != 'Windows'

      - name: Build and Package
        # This now calls the alias we created in the root build.gradle
        run: ./gradlew packageGame

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: GolfGame-${{ runner.os }}
          # Path updated to point to the desktop subproject's build folder.
          # The '*' catches 'desktop-1.0.jar' or whatever version you set.
          path: desktop/build/libs/*.jar